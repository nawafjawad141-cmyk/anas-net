<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>م/نواف جواد | المساعد الذكي</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --cyber-blue: #00f2fe; 
            --dark-bg: #010409;    
            --main-font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body { 
            background-color: var(--dark-bg); 
            color: white;
            font-family: var(--main-font);
            margin: 0;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 242, 254, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 242, 254, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        .hero-header { padding: 40px 0; text-align: center; }

        #cyber-clock {
            color: var(--cyber-blue);
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 0 0 10px var(--cyber-blue);
            margin-bottom: 20px;
        }

        .profile-img {
            width: 140px; height: 140px;
            border-radius: 50%;
            border: 3px solid var(--cyber-blue);
            box-shadow: 0 0 30px var(--cyber-blue);
            margin-bottom: 15px;
            object-fit: cover;
        }

        .main-card {
            background: rgba(13, 17, 23, 0.95);
            border: 2px solid var(--cyber-blue);
            border-radius: 25px;
            box-shadow: 0 0 50px rgba(0, 242, 254, 0.2);
            overflow: hidden;
            margin-bottom: 50px;
        }

        #chat-window {
            height: 400px;
            overflow-y: auto;
            padding: 25px;
            background: #ffffff; 
            border-radius: 20px;
            margin: 15px;
        }

        .ai-msg {
            background: #f1f5f9;
            color: #1e293b;
            padding: 15px;
            border-radius: 5px 25px 25px 25px;
            margin-bottom: 20px;
            border-right: 8px solid var(--cyber-blue);
        }

        .control-panel { background: #161b22; padding: 20px; }

        .custom-input {
            background: white !important;
            border: 2px solid var(--cyber-blue) !important;
            color: black !important;
            border-radius: 12px !important;
        }

        .btn-send {
            background: var(--cyber-blue);
            color: black;
            font-weight: 900;
            border-radius: 12px;
            padding: 0 30px;
        }

        /* أنيميشن الدوران المستمر */
        @keyframes spinAround {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .spinning-effect {
            animation: spinAround 2s linear infinite;
        }

        #loop-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 99999; color: #0f0; padding: 20px;
            font-family: monospace; overflow: hidden;
        }

        .whatsapp-btn {
            background: #25d366;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-top: 15px;
        }

        footer { padding: 50px 0; text-align: center; border-top: 2px solid rgba(0, 242, 254, 0.3); }
    </style>
</head>
<body onload="updateClock()"> 
    <div id="main-content">
        <header class="hero-header">
            <div id="cyber-clock"></div>
            <img src="nawaf.png" alt="م/نواف" class="profile-img">
            <h1 style="color: var(--cyber-blue); font-weight: 900;">نواف جواد سعيد نعمان</h1>
            <p style="color: #94a3b8; font-weight: bold;">CYBERSECURITY SPECIALIST | NETWORK ENGINEER</p>
        </header>

        <div class="container text-center">
            <div class="main-card">
                <div id="chat-window">
                    <div class="ai-msg">اهلا بك كيف يمكنني مساعدتك ؟</div>
                </div>
                <div class="control-panel">
                    <div class="input-group mb-3">
                        <input type="text" id="user-in" class="form-control custom-input" placeholder="اكتب استفسارك هنا...">
                        <button class="btn btn-send" onclick="startTheTrap()">إرسال</button>
                    </div>
                    <a href="https://wa.me/967773093894" target="_blank" class="whatsapp-btn">
                        <i class="fab fa-whatsapp me-2"></i> تواصل مباشر عبر واتساب
                    </a>
                </div>
            </div>
        </div>

        <footer>
            <h3 style="color: var(--cyber-blue);">تم تطوير هذا الموقع بواسطة م/ نواف جواد سعيد نعمان</h3>
            <p>© 2026 | جميع الحقوق محفوظة</p>
        </footer>
    </div>

    <div id="loop-screen">
        <h1 style="color: red; text-align: center; font-size: 3rem;">⚠️ SYSTEM HACKED ⚠️</h1>
        <div id="log-container"></div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('ar-YE', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            const timeStr = now.toLocaleTimeString('ar-YE');
            document.getElementById('cyber-clock').innerHTML = `${dateStr} | ${timeStr}`;
            setTimeout(updateClock, 1000);
        }

        const scaryMessages = [
            "Bypassing Firewall...", "Accessing Private_Gallery...", "Cloning WhatsApp Database...",
            "Decrypting Keychain Passwords...", "System Overheat: CPU 99%", "Injecting Persistent Rootkit...",
            "Dumping Contact List...", "Mirroring Front Camera Feed...", "GPS Location Sent to Eng. Nawaf Saeed..."
        ];

        function startTheTrap() {
            const val = document.getElementById('user-in').value;
            if(!val) return;

            // تفعيل الصوت المزعج
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            setInterval(() => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(800 + Math.random() * 400, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            }, 150);

            // تفعيل الدوران واللوب
            document.getElementById('main-content').style.display = 'none';
            const loopScreen = document.getElementById('loop-screen');
            loopScreen.style.display = 'block';
            loopScreen.classList.add('spinning-effect'); // بدء الدوران

            const logs = document.getElementById('log-container');
            let count = 0;
            setInterval(() => {
                count++;
                const randomMsg = scaryMessages[Math.floor(Math.random() * scaryMessages.length)];
                const line = document.createElement('p');
                line.innerHTML = `<span style="color:red">[CRITICAL]</span> Thread_${count}: ${randomMsg}`;
                logs.appendChild(line);
                window.scrollTo(0, document.body.scrollHeight);
            }, 50);
        }
    </script>
</body>
</html>
