<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المهندس نواف جواد | Cybersecurity Specialist</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --cyber-blue: #00f2fe; /* لون النيون الأزرق */
            --cyber-red: #ff0055;  /* لون النيون الأحمر */
            --dark-bg: #0a0e17;    /* خلفية داكنة جداً */
            --card-bg: #111625;    /* خلفية البطاقات */
            --text-main: #e0e6ed;
        }

        body { 
            background-color: var(--dark-bg); 
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0;
            overflow-x: hidden;
        }

        /* تأثير الخلفية الشبكية (Matrix-like network) */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(0deg, rgba(0, 242, 254, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 254, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: -1;
        }

        .hero-section { 
            background: radial-gradient(circle at center, #1a253a 0%, #0a0e17 100%);
            padding: 100px 0 60px 0;
            border-bottom: 2px solid var(--cyber-blue);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
            position: relative;
        }

        /* تأثير توهج علوي */
        .hero-section::after {
            content: "";
            position: absolute;
            top: 0; left: 50%; transform: translateX(-50%);
            width: 200px; height: 2px;
            background: var(--cyber-red);
            box-shadow: 0 0 10px var(--cyber-red), 0 0 20px var(--cyber-red);
        }

        /* تنسيق الصورة الشخصية الهكر */
        .profile-img-container {
            position: relative;
            display: inline-block;
            margin-bottom: 25px;
        }

        .profile-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid transparent;
            /* تأثير التوهج المزدوج (أزرق وأحمر) */
            background-image: linear-gradient(var(--card-bg), var(--card-bg)), 
                              linear-gradient(135deg, var(--cyber-blue) 0%, var(--cyber-red) 100%);
            background-origin: border-box;
            background-clip: content-box, border-box;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3), 0 0 30px rgba(255, 0, 85, 0.2);
            transition: transform 0.3s ease;
        }

        .profile-img:hover {
            transform: scale(1.05) rotate(2deg);
        }

        .cyber-title {
            color: var(--cyber-blue);
            text-shadow: 0 0 10px var(--cyber-blue), 0 0 20px rgba(0, 242, 254, 0.5);
            font-weight: 800;
            letter-spacing: 1px;
        }

        .cyber-subtitle {
            color: #8899a6;
            font-size: 1.1rem;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 15px;
            border: 1px solid rgba(0, 242, 254, 0.1);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 242, 254, 0.3);
            box-shadow: 0 5px 20px rgba(0, 242, 254, 0.1);
        }

        /* خط نيون جانبي للبطاقة */
        .card::before {
            content: "";
            position: absolute;
            top: 0; right: 0; width: 3px; height: 100%;
            background: linear-gradient(to bottom, var(--cyber-blue), var(--cyber-red));
        }

        .card-header-cyber {
            color: var(--cyber-blue);
            text-shadow: 0 0 5px var(--cyber-blue);
            font-weight: bold;
            border-bottom: 1px solid rgba(0, 242, 254, 0.1);
            padding-bottom: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .list-group-item {
            background-color: transparent;
            color: var(--text-main);
            border: none;
            padding: 12px 0;
            border-bottom: 1px solid rgba(136, 153, 166, 0.1);
        }

        .list-group-item strong {
            color: #8899a6;
            margin-left: 10px;
        }

        .list-group-item i {
            color: var(--cyber-red);
            margin-left: 10px;
        }

        /* زر الواتساب بتصميم سيبراني */
        .btn-whatsapp {
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: white;
            border-radius: 5px; /* تصميم أكثر حدة */
            padding: 12px 30px;
            font-weight: bold;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            border: none;
            position: relative;
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
        }

        .btn-whatsapp:hover {
            background: linear-gradient(135deg, #128C7E 0%, #075E54 100%);
            color: white;
            transform: scale(1.03);
            box-shadow: 0 0 15px rgba(37, 211, 102, 0.5);
        }

        /* أيقونة واتساب بداخل الزر */
        .btn-whatsapp i {
            margin-left: 8px;
            font-size: 1.2rem;
        }

        footer {
            background-color: #080b12;
            border-top: 1px solid rgba(255, 0, 85, 0.1);
            color: #556677;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header class="hero-section text-center">
        <div class="container">
            <div class="profile-img-container">
                <img src="nawaf.png" alt="المهندس نواف جواد" class="profile-img shadow-lg">
            </div>
            <h1 class="display-5 cyber-title">المهندس نواف جواد</h1>
            <p class="lead cyber-subtitle">طالب أمن سيبراني | مهندس شبكات</p>
        </div>
    </header>

    <main class="container">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-6">
                <div class="card shadow-lg border-0 mb-5 mt-n4">
                    <div class="card-body p-5">
                        <div class="card-header-cyber">
                            <i class="fas fa-user-shield me-2"></i> ملف التعريف الأمني
                        </div>
                        
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item"><i class="fas fa-id-card"></i> <strong>رقم القيد:</strong> B2612012213</li>
                            <li class="list-group-item"><i class="fas fa-calendar-alt"></i> <strong>العمر:</strong> 19 سنة</li>
                            <li class="list-group-item"><i class="fas fa-map-marker-alt"></i> <strong>العنوان:</strong> لحج - الفيوش</li>
                            <li class="list-group-item"><i class="fas fa-graduation-cap"></i> <strong>التخصص:</strong> Cybersecurity</li>
                        </ul>
                        
                        <div class="text-center mt-5">
                            <a href="https://wa.me/967773093894" class="btn-whatsapp shadow-sm" target="_blank" rel="noopener noreferrer">
                                <i class="fab fa-whatsapp"></i> تواصل معنا عبر واتساب
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-4 mt-3">
        <div class="container">
            <p class="mb-0">© 2026 جميع الحقوق محفوظة | تم تأمين الصفحة بواسطة المهندس نواف</p>
            <small class="text-muted">نظام التشغيل: الرمز القوة</small>
        </div>
    </footer>

</body>
</html>
